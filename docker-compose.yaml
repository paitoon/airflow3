---
x-airflow-common:
  &airflow-common
  build: .
  image: airflow-spark:3.2.2

  env_file:
    - ${ENV_FILE_PATH:-.env}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DAG_PROCESSOR__REFRESH_INTERVAL: "5"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    # [FIX] เปลี่ยนเป็น false เพื่อให้ child DAGs ที่ถูก trigger ไม่ถูก pause อัตโนมัติ
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    PIPELINE_API_URL: "http://idp_manager:8000"
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/data:/data
    # [FIX] Shared Ivy cache — ป้องกัน Spark download JAR ซ้ำและ race condition
    - ivy-cache:/home/airflow/.ivy2
    # [FIX] Pre-downloaded Spark JARs — ใช้แทน --packages เพื่อหลีกเลี่ยง network download
    - ${AIRFLOW_PROJ_DIR:-.}/jars:/opt/airflow/jars
    - ${AIRFLOW_PROJ_DIR:-.}/spark_logs:/opt/spark/logs
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - airflow-spark-net
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  postgres:
    # image: postgres:16          ← ลบบรรทัดนี้ออก
    build:
      context: ./postgres         # โฟลเดอร์ที่มี Dockerfile
      dockerfile: Dockerfile
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - airflow-spark-net

  redis:
    image: redis:7.2-bookworm
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    networks:
      - airflow-spark-net

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test: ["CMD-SHELL", 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      # Required to handle warm shutdown of the celery workers properly
      DUMB_INIT_SETSID: "0"
      AIRFLOW__WORKER__UMASK: "0022"
      AIRFLOW__CELERY__WORKER_CONCURRENCY: "32"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
               airflow users create
                 --username ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
                 --password ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
                 --firstname Admin
                 --lastname User
                 --role Admin
                 --email admin@example.com || true"
    environment:
      <<: *airflow-common-env
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: "0:0"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags

  # =========================================================================
  # SPARK CLUSTER SERVICES (Spark 3.5.8 + Python 3) - official Docker image
  # =========================================================================
  spark-master:
    image: spark:3.5.8-python3
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/dags/scripts:/opt/spark/app
      - ${AIRFLOW_PROJ_DIR:-.}/spark_logs:/opt/spark/logs
      - ${AIRFLOW_PROJ_DIR:-.}/data:/data
      - ${AIRFLOW_PROJ_DIR:-.}/spark_defaults.conf:/opt/spark/conf/spark-defaults.conf
    restart: always
    networks:
      - airflow-spark-net

  spark-worker:
    image: spark:3.5.8-python3
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_WEBUI_PORT=8081
    ports:
      - "8082:8081"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/dags/scripts:/opt/spark/app
      - ${AIRFLOW_PROJ_DIR:-.}/spark_logs:/opt/spark/logs
      - ${AIRFLOW_PROJ_DIR:-.}/data:/data
      - ${AIRFLOW_PROJ_DIR:-.}/spark_defaults.conf:/opt/spark/conf/spark-defaults.conf
    depends_on:
      - spark-master
    restart: always
    networks:
      - airflow-spark-net

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: always
    networks:
      - airflow-spark-net

  mc:
    image: minio/mc:latest
    container_name: mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minio minio123;
      mc mb -p local/lakehouse;
      exit 0;
      "
    restart: on-failure
    networks:
      - airflow-spark-net

  # =========================================================================
  # SPARK HISTORY SERVER (ตัวเปิดดู Log ย้อนหลังสำหรับวิเคราะห์ RCA)
  # =========================================================================
  spark-history-server:
    image: spark:3.5.8-python3
    container_name: spark-history-server
    user: "0"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.history.HistoryServer
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=/opt/spark/logs/spark-events
    ports:
      - "18080:18080"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/spark_logs:/opt/spark/logs
      - ${AIRFLOW_PROJ_DIR:-.}/spark_defaults.conf:/opt/spark/conf/spark-defaults.conf
    depends_on:
      - spark-master
    restart: always
    networks:
      - airflow-spark-net

  # =========================================================================
  # CENTRALIZED LOGGING STACK (Loki + Promtail + Grafana)
  # =========================================================================
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yaml
    networks:
      - airflow-spark-net
    restart: always

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    volumes:
      - ./loki/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - airflow-spark-net
    restart: always

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - airflow-spark-net
    restart: always

  idp_manager:
    build: ./idp_manager
    container_name: idp_manager
    working_dir: /app
    volumes:
      - ./idp_manager/app:/app/app
      - ./idp_manager/config:/app/config
      - ./idp_manager/run.py:/app/run.py
    env_file:
      - ./idp_manager/.env
    command: python run.py
    ports:
      - "8000:8000"
    networks:
      - airflow-spark-net
    restart: always

volumes:
  postgres-db-volume:
  minio-data:
  loki-data:
  grafana-data:
  # [FIX] Shared Ivy cache สำหรับ Spark JAR dependencies
  # ป้องกัน download ซ้ำ และ race condition เมื่อหลาย task รันพร้อมกัน
  ivy-cache:

networks:
  airflow-spark-net:
    driver: bridge
