server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # ใช้ชื่อ container เป็น label
      - source_labels: [__meta_docker_container_name]
        target_label: container
      # ใช้ image เป็น label
      - source_labels: [__meta_docker_container_image]
        target_label: image
      # จำแนก service group
      - source_labels: [__meta_docker_container_name]
        regex: ".*(airflow).*"
        target_label: service
        replacement: airflow
      - source_labels: [__meta_docker_container_name]
        regex: ".*(spark).*"
        target_label: service
        replacement: spark
      - source_labels: [__meta_docker_container_name]
        regex: ".*(minio|mc).*"
        target_label: service
        replacement: minio

